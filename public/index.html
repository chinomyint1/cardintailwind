<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind v4 Card</title>
    <link rel="stylesheet" href="./css/output.css" />
  </head>
  <body class="bg-slate-50 text-slate-900">
    <main class="min-h-screen px-4 py-10">
      <div class="mx-auto max-w-sm">
        <div class="overflow-hidden rounded-4xl border border-slate-200 bg-white shadow-xl shadow-slate-900/10">
          <div class="bg-slate-900 px-6 py-8 text-center text-white">
            <p class="text-sm font-semibold uppercase tracking-[0.3em] text-slate-300">Profil</p>
            <h1 class="mt-3 text-3xl font-semibold tracking-tight">Ny elev</h1>
            <p class="mt-2 text-sm leading-6 text-slate-300">Basiskort for elevens info og prioriteter.</p>
          </div>

          <div class="px-6 py-8">
            <div class="mx-auto h-28 w-28 overflow-hidden rounded-full border-4 border-white bg-slate-100 shadow-lg shadow-slate-900/10">
              <img
                class="h-full w-full object-cover"
                src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=400&q=80"
                alt="Student profile"
              />
            </div>

            <div class="mt-6 text-center">
              <p class="text-sm font-semibold uppercase tracking-[0.25em] text-indigo-600">casper j.</p>
              <h2 class="mt-2 text-2xl font-semibold text-slate-950">Ny elev</h2>
              <p class="mt-3 text-sm leading-6 text-slate-600">
                Klar til en god skolestart med nye fag, venner og spændende opgaver.
              </p>
            </div>

            <div class="mt-8 grid gap-4 sm:grid-cols-3">
              <div class="rounded-3xl bg-slate-50 p-4 text-center">
                <p class="text-sm font-semibold text-slate-950">8</p>
                <p class="mt-1 text-xs text-slate-500">Timer i skole</p>
              </div>
              <div class="rounded-3xl bg-slate-50 p-4 text-center">
                <p class="text-sm font-semibold text-slate-950">5</p>
                <p class="mt-1 text-xs text-slate-500">Fag denne uge</p>
              </div>
              <div class="rounded-3xl bg-slate-50 p-4 text-center">
                <p class="text-sm font-semibold text-slate-950">3</p>
                <p class="mt-1 text-xs text-slate-500">Nye venner</p>
              </div>
            </div>

            <div class="mt-8 space-y-4">
              <button class="w-full rounded-full bg-indigo-600 px-5 py-3 text-sm font-semibold text-white shadow-sm shadow-indigo-600/20 transition hover:bg-indigo-700">
                Se skoleplan
              </button>
              <a class="block text-center text-sm font-semibold text-indigo-600 transition hover:text-indigo-700" href="#">
                Rediger profil →
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
